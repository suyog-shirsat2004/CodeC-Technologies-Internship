<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeC Technologies - Internship Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2rem; margin-bottom: .5rem; color: #f8fafc; }
    p { color: #94a3b8; margin-bottom: 2rem; }
    .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .card { background: #1e293b; border-radius: 12px; padding: 2rem; width: 280px; text-decoration: none; color: inherit; transition: transform .2s, box-shadow .2s; border: 1px solid #334155; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.3); border-color: #3b82f6; }
    .card h2 { font-size: 1.25rem; margin-bottom: .5rem; color: #f8fafc; }
    .card p { font-size: .875rem; margin-bottom: 1rem; color: #94a3b8; }
    .badge { display: inline-block; background: #3b82f6; color: #fff; padding: .25rem .75rem; border-radius: 99px; font-size: .75rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CodeC Technologies Internship</h1>
    <p>MERN Stack Projects</p>
    <div class="cards">
      <a class="card" href="task-1/">
        <h2>E-Commerce Dashboard</h2>
        <p>Product catalog, cart, dummy payments, admin panel</p>
        <span class="badge">Task 1</span>
      </a>
      <a class="card" href="task-2/">
        <h2>Social Media Dashboard</h2>
        <p>Feed, posts, messaging, notifications, analytics</p>
        <span class="badge">Task 2</span>
      </a>
    </div>
  </div>
</body>
</html>
